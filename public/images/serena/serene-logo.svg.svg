<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4ade80"/>
    <stop offset="100%" stop-color="#16a34a"/>
  </linearGradient>
  <linearGradient id="lg2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#86efac"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
  <linearGradient id="lg3" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#22c55e"/>
    <stop offset="100%" stop-color="#15803d"/>
  </linearGradient>
  <linearGradient id="stG" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#22c55e"/>
    <stop offset="100%" stop-color="#15803d"/>
  </linearGradient>
  <linearGradient id="wG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="50%" stop-color="#ede9fe"/>
    <stop offset="100%" stop-color="#818cf8"/>
  </linearGradient>
  <radialGradient id="glG" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
    <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
  </radialGradient>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap');

    #glowEl { transform-origin:200px 115px; animation:glow 3s ease-in-out infinite; }
    @keyframes glow { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.14);opacity:1} }

    #herbEl { transform-origin:200px 175px; animation:sway 5s ease-in-out infinite; }
    @keyframes sway {
      0%,100%{transform:rotate(-2.5deg)}
      25%{transform:rotate(2deg) translateY(-4px)}
      50%{transform:rotate(-1.5deg) translateY(-6px)}
      75%{transform:rotate(2.5deg) translateY(-2px)}
    }

    .sp { animation:twinkle ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:.1;transform:scale(.5)} 50%{opacity:1;transform:scale(1.6)} }

    /* Letter by letter animation */
    .L1{animation:letterIn 0.6s cubic-bezier(.16,1,.3,1) both; animation-delay:0.1s}
    .L2{animation:letterIn 0.6s cubic-bezier(.16,1,.3,1) both; animation-delay:0.2s}
    .L3{animation:letterIn 0.6s cubic-bezier(.16,1,.3,1) both; animation-delay:0.3s}
    .L4{animation:letterIn 0.6s cubic-bezier(.16,1,.3,1) both; animation-delay:0.4s}
    .L5{animation:letterIn 0.6s cubic-bezier(.16,1,.3,1) both; animation-delay:0.5s}
    .L6{animation:letterIn 0.6s cubic-bezier(.16,1,.3,1) both; animation-delay:0.6s}
    @keyframes letterIn {
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }

    /* Shimmer on wordmark after letters appear */
    #wordGroup { animation:shimmer 4s ease-in-out infinite 1s; }
    @keyframes shimmer { 0%,100%{opacity:.88} 50%{opacity:1} }

    /* Tagline fade in */
    #tagEl { animation:tagIn 1s ease both; animation-delay:1s; }
    @keyframes tagIn { from{opacity:0;transform:translateY(8px)} to{opacity:.65;transform:translateY(0)} }

    /* Underline draw */
    #underline { animation:drawLine 1s ease both; animation-delay:1.2s; }
    @keyframes drawLine { from{stroke-dashoffset:120} to{stroke-dashoffset:0} }
  </style>
</defs>

<!-- Glow ring -->
<ellipse id="glowEl" cx="200" cy="115" rx="90" ry="90" fill="url(#glG)"/>
<ellipse id="glowEl" cx="200" cy="115" rx="104" ry="104" fill="none" stroke="#7c3aed" stroke-width="0.6" stroke-opacity="0.2"/>

<!-- HERB -->
<g id="herbEl">
  <!-- Main stem -->
  <path d="M200 185 C200 165 199 145 200 122 C201 102 200 88 200 68" stroke="url(#stG)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Lower left branch -->
  <line x1="200" y1="162" x2="162" y2="150" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
  <!-- Lower left leaf large -->
  <path d="M162 150 C146 140 130 133 120 122 C113 115 116 104 127 102 C138 100 152 108 164 120 C175 131 176 146 170 156 Z" fill="url(#lg1)"/>
  <path d="M161 147 C144 136 128 127 121 118" stroke="#15803d" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Lower left small leaf -->
  <path d="M172 154 C158 148 146 143 138 136 C132 131 133 122 141 120 C149 118 160 124 169 133 C177 141 177 153 174 159 Z" fill="url(#lg3)" opacity="0.9"/>

  <!-- Lower right branch -->
  <line x1="200" y1="155" x2="238" y2="143" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
  <!-- Lower right leaf large -->
  <path d="M238 143 C254 133 270 126 280 115 C287 108 284 97 273 95 C262 93 248 101 236 113 C225 124 224 139 230 149 Z" fill="url(#lg2)"/>
  <path d="M239 140 C256 129 272 120 280 111" stroke="#15803d" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Lower right small leaf -->
  <path d="M228 147 C242 141 254 136 262 129 C268 124 267 115 259 113 C251 111 240 117 231 126 C222 135 221 147 224 153 Z" fill="url(#lg3)" opacity="0.9"/>

  <!-- Mid left branch -->
  <line x1="199" y1="128" x2="164" y2="116" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <!-- Mid left leaf -->
  <path d="M164 116 C150 107 138 100 130 91 C124 84 127 74 137 73 C147 72 159 80 168 91 C177 102 177 115 172 123 Z" fill="url(#lg2)" opacity="0.92"/>
  <path d="M163 113 C149 104 136 96 131 88" stroke="#15803d" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Mid right branch -->
  <line x1="201" y1="120" x2="235" y2="108" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <!-- Mid right leaf -->
  <path d="M235 108 C249 99 261 92 269 83 C275 76 272 66 262 65 C252 64 240 72 231 83 C222 94 222 107 227 115 Z" fill="url(#lg1)" opacity="0.92"/>
  <path d="M236 105 C250 96 263 87 269 79" stroke="#15803d" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Upper left small -->
  <path d="M199 96 C186 89 176 83 169 76 C163 70 165 61 173 60 C181 59 191 65 199 74 C206 83 205 94 202 100 Z" fill="url(#lg1)" opacity="0.88"/>

  <!-- Upper right small -->
  <path d="M201 88 C214 81 224 75 231 68 C237 62 234 53 226 52 C218 51 208 57 201 66 C194 75 194 86 197 92 Z" fill="url(#lg2)" opacity="0.88"/>

  <!-- Top leaf -->
  <path d="M200 68 C185 78 179 93 184 108 C188 119 195 125 200 125 C205 125 212 119 216 108 C221 93 215 78 200 68 Z" fill="url(#lg1)"/>
  <line x1="200" y1="73" x2="200" y2="121" stroke="#15803d" stroke-width="1.2" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Buds -->
  <circle cx="118" cy="116" r="5" fill="#4ade80" opacity="0.8"/>
  <circle cx="116" cy="112" r="3" fill="#86efac" opacity="0.9"/>
  <circle cx="282" cy="109" r="5" fill="#4ade80" opacity="0.8"/>
  <circle cx="284" cy="105" r="3" fill="#86efac" opacity="0.9"/>
</g>

<!-- Sparkles -->
<circle class="sp" cx="114" cy="106" r="2.5" fill="#a78bfa" style="animation-duration:2.2s"/>
<circle class="sp" cx="288" cy="100" r="2"   fill="#c4b5fd" style="animation-duration:2.7s;animation-delay:.5s"/>
<circle class="sp" cx="126" cy="72"  r="2"   fill="#a78bfa" style="animation-duration:1.9s;animation-delay:1s"/>
<circle class="sp" cx="275" cy="64"  r="2"   fill="#c4b5fd" style="animation-duration:2.4s;animation-delay:.3s"/>
<circle class="sp" cx="184" cy="56"  r="2.5" fill="#a78bfa" style="animation-duration:3s;animation-delay:.8s"/>
<circle class="sp" cx="218" cy="54"  r="2"   fill="#c4b5fd" style="animation-duration:2s;animation-delay:1.3s"/>

<!-- WORDMARK — letter by letter animation -->
<g id="wordGroup">
  <text class="L1" x="68"  y="232" font-family="'Cormorant Garamond',Georgia,serif" font-size="62" font-weight="300" fill="url(#wG)">S</text>
  <text class="L2" x="103" y="232" font-family="'Cormorant Garamond',Georgia,serif" font-size="62" font-weight="300" fill="url(#wG)">E</text>
  <text class="L3" x="138" y="232" font-family="'Cormorant Garamond',Georgia,serif" font-size="62" font-weight="300" fill="url(#wG)">R</text>
  <text class="L4" x="173" y="232" font-family="'Cormorant Garamond',Georgia,serif" font-size="62" font-weight="300" fill="url(#wG)">E</text>
  <text class="L5" x="208" y="232" font-family="'Cormorant Garamond',Georgia,serif" font-size="62" font-weight="300" fill="url(#wG)">N</text>
  <text class="L6" x="248" y="232" font-family="'Cormorant Garamond',Georgia,serif" font-size="62" font-weight="300" fill="url(#wG)">E</text>
</g>

<!-- Tagline -->
<text id="tagEl" x="200" y="262" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="300" letter-spacing="4" fill="#a78bfa">YOUR MENTAL WELLNESS COMPANION</text>

<!-- Underline -->
<line id="underline" x1="140" y1="272" x2="260" y2="272" stroke="#6c63ff" stroke-width="0.6" stroke-dasharray="120" stroke-dashoffset="120" opacity="0.4"/>
</svg>
