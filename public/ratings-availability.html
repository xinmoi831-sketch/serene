  1. Add before </body>:
     - Rating modal
     - Availability picker modal

  2. Add to the tJoinSession() function after window.open():
     setTimeout(function(){ tShowRatingPrompt(currentBookingData); }, 3000000); // 50 min

<!-- RATING MODAL — paste before </body> -->
<div class="t-modal" id="tRatingModal">
  <div class="t-card" style="max-width:400px">
    <div class="t-header">
      <div style="font-size:17px;font-weight:600;color:#f0f4ff">Rate Your Session</div>
      <button class="t-close" onclick="document.getElementById('tRatingModal').style.display='none'">✕</button>
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:13px;color:#8b9dc3;margin-bottom:16px">How was your session with <span id="ratingTherapistName" style="color:#f0f4ff;font-weight:500"></span>?</div>
      <div id="starRating" style="font-size:40px;cursor:pointer;letter-spacing:4px">
        <span onclick="setRating(1)" data-star="1">☆</span>
        <span onclick="setRating(2)" data-star="2">☆</span>
        <span onclick="setRating(3)" data-star="3">☆</span>
        <span onclick="setRating(4)" data-star="4">☆</span>
        <span onclick="setRating(5)" data-star="5">☆</span>
      </div>
      <div id="ratingLabel" style="font-size:13px;color:#8b9dc3;margin-top:8px;min-height:20px"></div>
    </div>
    <div class="t-alert" id="tRatingAlert"></div>
    <div class="t-field">
      <label>Leave a comment (optional)</label>
      <textarea id="ratingComment" rows="3" placeholder="Share your experience..."></textarea>
    </div>
    <button class="t-submit" id="tRatingBtn" onclick="tSubmitRating()">Submit Review</button>
    <button onclick="document.getElementById('tRatingModal').style.display='none'" style="width:100%;padding:12px;background:transparent;border:none;color:#8b9dc3;font-size:13px;cursor:pointer;margin-top:6px">Skip for now</button>
  </div>
</div>


<!-- AVAILABILITY PICKER MODAL — paste before </body> -->
<div class="t-modal" id="tSlotModal">
  <div class="t-card" style="max-width:440px">
    <div class="t-header">
      <div style="font-size:17px;font-weight:600;color:#f0f4ff">Choose a Time Slot</div>
      <button class="t-close" onclick="document.getElementById('tSlotModal').style.display='none'">✕</button>
    </div>
    <div style="font-size:13px;color:#8b9dc3;margin-bottom:16px" id="slotTherapistInfo"></div>
    <div class="t-alert" id="tSlotAlert"></div>
    <div id="slotsList" style="max-height:400px;overflow-y:auto"></div>
    <div style="margin-top:14px;padding-top:14px;border-top:0.5px solid rgba(255,255,255,0.08)">
      <div style="font-size:12px;color:#8b9dc3;margin-bottom:8px">Or pick a custom date and time:</div>
      <input id="tSlotCustom" type="datetime-local" style="width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:10px;color:#f0f4ff;font-size:14px;font-family:inherit;margin-bottom:10px"/>
      <button onclick="tUseCustomSlot()" style="width:100%;padding:12px;background:rgba(99,102,241,0.15);border:0.5px solid rgba(99,102,241,0.3);border-radius:10px;color:#a5b4fc;font-size:14px;cursor:pointer">Use custom time</button>
    </div>
  </div>
</div>


<!-- RATING + AVAILABILITY JAVASCRIPT — paste inside <script> tag -->
<script>
// ── RATINGS ───────────────────────────────────────────────────────
var currentRating   = 0;
var currentBookingId = null;
var ratingLabels    = ["","Poor","Fair","Good","Very Good","Excellent"];

function setRating(n) {
  currentRating = n;
  var stars = document.querySelectorAll("#starRating span");
  stars.forEach(function(s, i) {
    s.textContent = i < n ? "★" : "☆";
    s.style.color = i < n ? "#f59e0b" : "#4a5568";
  });
  document.getElementById("ratingLabel").textContent = ratingLabels[n] || "";
}

function tShowRatingPrompt(bookingData) {
  if (!bookingData || !bookingData.bookingId) return;
  currentBookingId = bookingData.bookingId;
  currentRating    = 0;
  document.getElementById("ratingTherapistName").textContent = bookingData.therapistName || "your therapist";
  document.getElementById("ratingComment").value = "";
  document.getElementById("tRatingAlert").style.display = "none";
  setRating(0);
  document.getElementById("tRatingModal").style.display = "flex";
}

async function tSubmitRating() {
  if (currentRating === 0) {
    var alrt = document.getElementById("tRatingAlert");
    alrt.textContent = "Please select a star rating.";
    alrt.style.display = "block"; alrt.style.color = "#f43f5e";
    return;
  }
  var btn  = document.getElementById("tRatingBtn");
  var comment = document.getElementById("ratingComment").value.trim();
  btn.textContent = "Submitting..."; btn.disabled = true;

  var res = await fetch("/api/therapist/review", {
    method:  "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + api.getToken() },
    body:    JSON.stringify({ bookingId: currentBookingId, rating: currentRating, comment: comment }),
  });
  var data = await res.json();
  btn.textContent = "Submit Review"; btn.disabled = false;

  if (res.ok) {
    document.getElementById("tRatingModal").style.display = "none";
    alert("✅ Thank you for your review!");
  } else {
    var alrt = document.getElementById("tRatingAlert");
    alrt.textContent = data.error || "Could not submit review.";
    alrt.style.display = "block"; alrt.style.color = "#f43f5e";
  }
}

// ── AVAILABILITY SLOTS ────────────────────────────────────────────
var selectedSlot     = null;
var currentSlotData  = null;

async function tOpenBook(id, name, price) {
  if (!api.getToken()) { alert("Please log in to book a session."); return; }

  currentSlotData = { id: id, name: name, price: price };
  document.getElementById("slotTherapistInfo").textContent = name + " · K" + price + " per session";
  document.getElementById("tSlotAlert").style.display = "none";
  document.getElementById("tSlotCustom").value = "";
  selectedSlot = null;

  var list = document.getElementById("slotsList");
  list.innerHTML = '<div style="text-align:center;padding:20px;color:#8b9dc3">Loading available slots...</div>';
  document.getElementById("tSlotModal").style.display = "flex";

  try {
    var res  = await fetch("/api/therapist/slots/" + id);
    var data = await res.json();

    if (!data.slots || data.slots.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#8b9dc3">No scheduled slots available. Use the custom time below.</div>';
      return;
    }

    // Group slots by date
    var grouped = {};
    data.slots.forEach(function(slot) {
      if (!grouped[slot.date]) grouped[slot.date] = [];
      grouped[slot.date].push(slot);
    });

    list.innerHTML = Object.keys(grouped).map(function(date) {
      var daySlots = grouped[date].map(function(slot) {
        return '<button onclick="selectSlot(\'' + slot.dateTime + '\',this)" ' +
          'style="padding:8px 14px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:#f0f4ff;font-size:13px;cursor:pointer;margin:4px;transition:all 0.2s" ' +
          'data-slot="' + slot.dateTime + '">' +
          slot.time + ' (' + slot.duration + 'min)' +
          '</button>';
      }).join('');

      return '<div style="margin-bottom:14px">' +
        '<div style="font-size:12px;font-weight:500;color:#8b9dc3;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">' + date + '</div>' +
        '<div style="display:flex;flex-wrap:wrap">' + daySlots + '</div>' +
        '</div>';
    }).join('');
  } catch(e) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:#f43f5e">Could not load slots. Use custom time below.</div>';
  }
}

function selectSlot(dateTime, btn) {
  selectedSlot = dateTime;
  document.querySelectorAll("#slotsList button").forEach(function(b) {
    b.style.background = "rgba(255,255,255,0.06)";
    b.style.borderColor = "rgba(255,255,255,0.12)";
    b.style.color = "#f0f4ff";
  });
  btn.style.background   = "rgba(99,102,241,0.25)";
  btn.style.borderColor  = "rgba(99,102,241,0.5)";
  btn.style.color        = "#a5b4fc";

  // Proceed to booking confirmation
  setTimeout(function() { tConfirmSlot(); }, 300);
}

function tUseCustomSlot() {
  var val = document.getElementById("tSlotCustom").value;
  if (!val) { alert("Please select a date and time."); return; }
  selectedSlot = new Date(val).toISOString();
  tConfirmSlot();
}

function tConfirmSlot() {
  if (!selectedSlot || !currentSlotData) return;
  document.getElementById("tSlotModal").style.display = "none";

  // Open booking modal with pre-filled time
  document.getElementById("tBookTherapistId").value    = currentSlotData.id;
  document.getElementById("tBookName").textContent     = "Book with " + currentSlotData.name;
  document.getElementById("tBookPrice").textContent    = "K" + currentSlotData.price + " per session";
  document.getElementById("tBookAlert").style.display  = "none";
  document.getElementById("tBookDateTime").value       = selectedSlot.slice(0,16);
  document.getElementById("tBookNotes").value          = "";
  document.getElementById("tBookBtn").textContent      = "Confirm Booking";
  document.getElementById("tBookBtn").disabled         = false;
  document.getElementById("tBookModal").style.display  = "flex";
}
</script>
