<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — Serene</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0fdf4; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { background: white; border-radius: 16px; padding: 3rem 2rem; text-align: center; max-width: 400px; width: 100%; border: 1px solid #bbf7d0; }
    .icon { width: 64px; height: 64px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 28px; }
    h1 { font-size: 22px; color: #14532d; margin-bottom: 0.5rem; }
    p { color: #166534; font-size: 15px; line-height: 1.6; margin-bottom: 1.5rem; }
    .badge { display: inline-block; background: #dcfce7; color: #14532d; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; margin-bottom: 1.5rem; }
    a { display: inline-block; background: #16a34a; color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; }
    a:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Payment successful!</h1>
    <div class="badge">Pro subscription activated</div>
    <p>Welcome to Serene Pro. Your account has been upgraded and your 7-day free trial has started.</p>
    <a href="/">Back to app</a>
  </div>
</body>
</html>
