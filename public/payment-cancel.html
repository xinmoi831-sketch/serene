<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — Serene</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { background: white; border-radius: 16px; padding: 3rem 2rem; text-align: center; max-width: 400px; width: 100%; border: 1px solid #e5e7eb; }
    .icon { width: 64px; height: 64px; background: #f3f4f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 28px; }
    h1 { font-size: 22px; color: #111827; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 1.5rem; }
    a { display: inline-block; background: #111827; color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; }
    a:hover { background: #1f2937; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">←</div>
    <h1>Payment cancelled</h1>
    <p>No worries — you have not been charged. You can upgrade any time from your account settings.</p>
    <a href="/">Back to app</a>
  </div>
</body>
</html>
